<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chi tiết học liệu | CodeHSG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link active" href="book.html">Học liệu</a><a class="nav-link" href="exam.html">Đề thi</a></div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <a href="book.html" class="btn btn-link px-0"><i class="bi bi-arrow-left"></i> Quay lại danh sách học liệu</a>
    <div id="detail" class="mt-2"></div>
  </main>

  <footer class="footer footer-compact">
    <div class="container py-3">
      <div class="footer-layout">
        <div class="small"><span class="fw-semibold">© 2026 CodeHSG</span> · <span>Tác giả: TTKNDEV</span></div>
        <form id="newsletterForm" class="d-flex gap-2 newsletter-form" novalidate>
          <div class="input-group input-group-sm"><span class="input-group-text"><i class="bi bi-envelope-at"></i></span><input type="email" id="newsletterEmail" class="form-control" placeholder="Đăng ký nhận tin qua email" required><button class="btn btn-warning" type="submit"><i class="bi bi-send"></i></button></div>
          <small id="newsletterMsg" class="text-light-emphasis"></small>
        </form>
        <div class="d-flex gap-2 justify-content-end"><a class="social-link" href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a><a class="social-link" href="#" aria-label="Youtube"><i class="bi bi-youtube"></i></a><a class="social-link" href="#" aria-label="Github"><i class="bi bi-github"></i></a></div>
      </div>
    </div>
  </footer>

  <script>
    const id = new URLSearchParams(location.search).get('id');

    (async () => {
      const data = (await fetch('data/books.json').then(r => r.json())).find(i => i.id === id && i.is_ready);
      if (!data) {
        document.getElementById('detail').innerHTML = '<div class="card content-card"><div class="card-body">Không tìm thấy học liệu.</div></div>';
        return;
      }

      document.title = `${data.title} | CodeHSG`;
      const tags = data.subcategory || [];

      document.getElementById('detail').innerHTML = `
      <div class="card content-card mb-3"><div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
          <div><h1 class="h3 mb-1">${data.title}</h1><p class="meta mb-2"><i class="bi bi-person"></i> ${data.author || 'Đang cập nhật'} · <i class="bi bi-calendar3"></i> ${data.year || '-'} · <i class="bi bi-bookmark"></i> ${data.category || '-'}</p></div>
          <div class="d-flex flex-wrap gap-2">${tags.map(t => `<span class="badge text-bg-light border">#${t}</span>`).join('') || '<span class="badge text-bg-light border">#book</span>'}</div>
        </div>
      </div></div>

      <div class="row g-3">
        <div class="col-lg-8">
          <div class="card content-card mb-3"><div class="card-body p-4"><h2 class="h5"><i class="bi bi-card-text me-2"></i>Mô tả tài liệu</h2><p class="detail-kv mb-0">${(data.description || 'Đang cập nhật mô tả.').replace(/\n/g, '<br>')}</p></div></div>
          <div class="card content-card"><div class="card-body p-4"><h2 class="h5"><i class="bi bi-list-check me-2"></i>Thông tin nhanh</h2><div class="exam-info-inline"><span><i class="bi bi-file-earmark"></i> ${String(data.file_ext || 'pdf').toUpperCase()} • ${data.file_size || '-'}</span><span><i class="bi bi-file-earmark-text"></i> ${data.pages || '-'} trang</span><span><i class="bi bi-building"></i> ${data.publisher || 'Đang cập nhật'}</span></div></div></div>
        </div>

        <div class="col-lg-4">
          <div class="card content-card mb-3"><img src="${data.images?.[0] || 'assets/images/ltc-banner.png'}" alt="${data.title}"></div>
          <div class="card content-card"><div class="card-body p-4"><h2 class="h6 mb-3"><i class="bi bi-bar-chart-line me-2"></i>Thống kê học liệu</h2><div class="row g-2 text-center"><div class="col-6"><div class="stat-box"><div class="h5 mb-0">${(data.view_count || 0).toLocaleString('vi-VN')}</div><small>Lượt xem</small></div></div><div class="col-6"><div class="stat-box"><div class="h5 mb-0">${(data.download_count || 0).toLocaleString('vi-VN')}</div><small>Lượt tải</small></div></div></div><div class="d-grid gap-2 mt-3"><a class="btn btn-primary btn-sm" target="_blank" href="${data.drive_view || '#'}"><i class="bi bi-eye"></i> Đọc online</a><a class="btn btn-outline-primary btn-sm" target="_blank" href="${data.drive_download || data.drive_view || '#'}"><i class="bi bi-download"></i> Tải tài liệu</a></div></div></div>
        </div>
      </div>`;
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/newsletter.js"></script>
</body>

</html>
