<!doctype html><html lang="vi"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Chi tiết đề thi | CodeHSG</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link" href="book.html">Học liệu</a><a class="nav-link active" href="exam.html">Đề thi</a></div></div></div></nav>
<main class="container py-4"><a href="exam.html" class="btn btn-link px-0"><i class="bi bi-arrow-left"></i> Quay lại danh sách đề thi</a><div id="detail" class="card content-card mt-2"></div></main>
<div class="modal fade" id="imageModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Ảnh đề thi</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="previewImg" class="img-fluid rounded"></div></div></div></div>
<script>
const id=new URLSearchParams(location.search).get('id');
(async()=>{const data=(await fetch('data/exams.json').then(r=>r.json())).find(i=>i.id===id&&i.is_ready);if(!data){document.getElementById('detail').innerHTML='<div class="card-body">Không tìm thấy đề thi.</div>';return;}const tests=(data.testcases||[]).length, hasSol=!!data.solution_detail;document.title=`${data.title} | CodeHSG`;document.getElementById('detail').innerHTML=`<div class="card-body"><h1 class="h4">${data.title}</h1><p class="meta mb-2"><i class="bi bi-building"></i> ${data.organization||'-'} • <i class="bi bi-calendar2"></i> ${data.year||'-'} • <i class="bi bi-mortarboard"></i> ${data.grade||'-'}</p><p>${data.description||'Chưa có mô tả chi tiết cho đề thi này.'}</p><div class="mb-3"><span class="badge text-bg-light me-1">${data.file_size||'-'}</span><span class="badge text-bg-light me-1">${data.duration||'-'}</span><span class="badge text-bg-light me-1">${(data.view_count||0).toLocaleString('vi-VN')} lượt xem</span><span class="badge text-bg-light">${(data.download_count||0).toLocaleString('vi-VN')} lượt tải</span></div><div class="alert alert-info py-2">${hasSol?'Đề thi có lời giải, bấm vào "Xem" để tham khảo.':'Đề thi chưa có lời giải đính kèm.'} ${(tests>0)?`Có ${tests} testcase, bấm "Chi tiết testcase" bên dưới để xem.`:'Chưa có testcase công khai.'}</div><div class="d-flex gap-2 mb-3"><a class="btn btn-success" target="_blank" href="${data.drive_view}"><i class="bi bi-eye"></i> Xem</a><a class="btn btn-outline-success" target="_blank" href="${data.drive_download}"><i class="bi bi-cloud-download"></i> Tải</a></div><details class="mb-3" ${tests>0?'':'hidden'}><summary class="fw-semibold">Chi tiết testcase</summary><pre class="bg-light p-3 rounded mt-2" style="white-space:pre-wrap">${JSON.stringify(data.testcases||[],null,2)}</pre></details><div class="row g-3">${(data.images||[]).map((img,idx)=>`<div class="col-6 col-lg-3"><img src="${img}" class="img-fluid rounded border exam-thumb" data-img="${img}" alt="Trang ${idx+1}"></div>`).join('')||'<p>Chưa có ảnh xem trước.</p>'}</div></div>`;document.querySelectorAll('.exam-thumb').forEach(el=>el.addEventListener('click',()=>{document.getElementById('previewImg').src=el.dataset.img;new bootstrap.Modal(document.getElementById('imageModal')).show();}));})();
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
