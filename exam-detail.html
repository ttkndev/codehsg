<!doctype html><html lang="vi"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Chi tiết đề thi | CodeHSG</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link" href="book.html">Học liệu</a><a class="nav-link active" href="exam.html">Đề thi</a></div></div></div></nav>
<main class="container py-4"><a href="exam.html" class="btn btn-link px-0"><i class="bi bi-arrow-left"></i> Quay lại danh sách đề thi</a><div id="detail" class="mt-2"></div></main>
<footer class="footer py-5 mt-4"><div class="container"><div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3"><div><div class="fw-semibold">© 2026 CodeHSG</div><div class="small text-light-emphasis">CodeHSG Exam Library</div></div><div class="d-flex gap-2"><a class="social-link" href="#" aria-label="Github"><i class="bi bi-github"></i></a><a class="social-link" href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a><a class="social-link" href="#" aria-label="Youtube"><i class="bi bi-youtube"></i></a><a class="social-link" href="#" aria-label="Email"><i class="bi bi-envelope"></i></a></div></div></div></footer>
<div class="modal fade" id="imageModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Ảnh đề thi</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="previewImg" class="img-fluid rounded"></div></div></div></div>
<script>
const id=new URLSearchParams(location.search).get('id');
(async()=>{const data=(await fetch('data/exams.json').then(r=>r.json())).find(i=>i.id===id&&i.is_ready);if(!data){document.getElementById('detail').innerHTML='<div class="card content-card"><div class="card-body">Không tìm thấy đề thi.</div></div>';return;}const tests=(data.testcases||[]).length;document.title=`${data.title} | CodeHSG`;document.getElementById('detail').innerHTML=`<div class="row g-3"><div class="col-lg-8"><div class="card content-card"><div class="card-body p-4"><div class="d-flex align-items-start gap-3 mb-3"><div class="exam-doc-icon ${((data.tags||[]).join(' ').toLowerCase().includes('hsg'))?'icon-hsg':'icon-tht'}"><i class="bi ${((data.tags||[]).join(' ').toLowerCase().includes('hsg'))?'bi-mortarboard':'bi-journal-code'}"></i></div><div><h1 class="h3 mb-1">${data.title}</h1><p class="meta mb-0"><i class="bi bi-calendar2"></i> ${data.year||'-'} &nbsp;&nbsp; <i class="bi bi-mortarboard"></i> ${data.grade||'-'}</p></div></div><h2 class="h5 mb-2">Danh sách bài toán (${(data.problem_names||[]).length})</h2><div class="exam-problems mb-3">${(data.problem_names||[]).map((n,idx)=>`<span class="badge exam-chip">${idx+1}. ${n}</span>`).join('')||'<span class="badge exam-chip">Chưa có problem_names</span>'}</div><h2 class="h5 mb-2">Xem trước</h2><div class="row g-2">${(data.images||[]).map((img,idx)=>`<div class="col-12"><img src="${img}" class="img-fluid rounded border exam-thumb w-100" data-img="${img}" alt="Trang ${idx+1}"></div>`).join('')||'<p>Chưa có ảnh xem trước.</p>'}</div></div></div></div><div class="col-lg-4"><div class="card content-card h-100"><div class="card-body p-4"><h2 class="h4 mb-3">Thông tin</h2><div class="exam-info-inline mb-2"><span><i class="bi bi-building"></i> ${data.organization||'-'}</span><span><i class="bi bi-file-earmark"></i> ${String(data.file_ext||'pdf').toUpperCase()} • ${data.file_size||'-'}</span><span><i class="bi bi-clock"></i> ${data.duration||'-'}</span></div><div class="d-grid gap-2 mb-3"><a class="btn btn-sm btn-primary" target="_blank" href="${data.drive_view||'#'}"><i class="bi bi-eye me-1"></i>Làm bài</a><a class="btn btn-sm btn-outline-primary" target="_blank" href="${data.drive_download||data.drive_view||'#'}"><i class="bi bi-download me-1"></i>Tải xuống PDF</a></div><details ${tests>0?'':'hidden'}><summary class="fw-semibold">Chi tiết testcase</summary><pre class="bg-light p-3 rounded mt-2" style="white-space:pre-wrap">${JSON.stringify(data.testcases||[],null,2)}</pre></details><div class="exam-stats mt-3 pt-3"><span><i class="bi bi-eye"></i> ${(data.view_count||0).toLocaleString('vi-VN')} lượt xem</span><br><span><i class="bi bi-download"></i> ${(data.download_count||0).toLocaleString('vi-VN')} lượt tải</span></div></div></div></div></div>`;document.querySelectorAll('.exam-thumb').forEach(el=>el.addEventListener('click',()=>{document.getElementById('previewImg').src=el.dataset.img;new bootstrap.Modal(document.getElementById('imageModal')).show();}));})();
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
