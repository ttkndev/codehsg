<!doctype html><html lang="vi"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Chi tiết đề thi | CodeHSG</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1"></i>CodeHSG</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link" href="book.html">Học liệu</a><a class="nav-link active" href="exam.html">Đề thi</a></div></div></div></nav>
<main class="container py-4"><a href="exam.html" class="btn btn-link px-0"><i class="bi bi-arrow-left"></i> Quay lại danh sách đề thi</a><div id="detail" class="mt-2"></div></main>
<footer class="footer py-5 mt-4"><div class="container"><div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3"><div><div class="fw-semibold">© 2026 CodeHSG</div><div class="small text-light-emphasis">CodeHSG Exam Library</div></div><div class="d-flex gap-2"><a class="social-link" href="#"><i class="bi bi-github"></i></a><a class="social-link" href="#"><i class="bi bi-facebook"></i></a><a class="social-link" href="#"><i class="bi bi-youtube"></i></a><a class="social-link" href="#"><i class="bi bi-envelope"></i></a></div></div></div></footer>
<div class="modal fade" id="imageModal" tabindex="-1" data-bs-keyboard="false"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Ảnh đề thi</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="previewImg" class="img-fluid rounded"></div></div></div></div>
<script>
const norm=t=>(t??'').toString().trim().replace(/\r\n/g,'\n').replace(/\s+/g,' ').toLowerCase();
const id=new URLSearchParams(location.search).get('id');
(async()=>{const data=(await fetch('data/exams.json').then(r=>r.json())).find(i=>i.id===id&&i.is_ready);if(!data){document.getElementById('detail').innerHTML='<div class="card content-card"><div class="card-body">Không tìm thấy đề thi.</div></div>';return;}const tests=(data.testcases||[]); const hasSolution=Boolean(data.solution_detail); const tags=(data.tags||[]).join(' ').toLowerCase(); document.title=`${data.title} | CodeHSG`;document.getElementById('detail').innerHTML=`<div class="row g-3"><div class="col-lg-8"><div class="card content-card"><div class="card-body p-4"><div class="d-flex align-items-start gap-3 mb-3"><div class="exam-doc-icon ${tags.includes('hsg')?'icon-hsg':'icon-tht'}"><i class="bi bi-patch-check"></i></div><div><h1 class="h3 mb-1">${data.title}</h1><p class="meta mb-1">${data.organization||'-'} • ${data.year||'-'} • ${data.grade||'-'}</p><div class="d-flex gap-2 flex-wrap"><span class="badge text-bg-light border">${tags.includes('hsg')?'Đề HSG':'Tin học trẻ'}</span>${hasSolution?'<span class="badge text-bg-success">Có lời giải</span>':''}${data.is_featured?'<span class="badge text-bg-warning">Nổi bật</span>':''}${tests.length?'<span class="badge text-bg-info">Có chấm điểm</span>':''}</div></div></div><h2 class="h5 mb-2">Danh sách bài toán (${(data.problem_names||[]).length})</h2><div class="exam-problems mb-3">${(data.problem_names||[]).map((n,idx)=>`<span class="badge exam-chip">${idx+1}. ${n}</span>`).join('')||'<span class="badge exam-chip">Chưa có problem_names</span>'}</div><p class="detail-kv mb-3">${(data.description||'').replace(/\n/g,'<br>')}</p><h2 class="h5 mb-2">Xem trước hình ảnh đề</h2><div class="row g-2">${(data.images||[]).map((img,idx)=>`<div class="col-6"><img src="${img}" class="img-fluid rounded border exam-thumb w-100" data-img="${img}" alt="Trang ${idx+1}"></div>`).join('')||'<p>Chưa có ảnh xem trước.</p>'}</div></div></div></div><div class="col-lg-4"><div class="card content-card"><div class="card-body p-4"><h2 class="h4 mb-3">Thông tin chi tiết</h2><div class="exam-info-inline mb-2"><span><i class="bi bi-file-earmark"></i> ${String(data.file_ext||'pdf').toUpperCase()} • ${data.file_size||'-'}</span><span><i class="bi bi-clock"></i> ${data.duration||'-'}</span><span><i class="bi bi-list-check"></i> ${(data.problem_names||[]).length} bài toán</span><span><i class="bi bi-calendar2"></i> ${data.last_updated||'-'}</span></div><div class="exam-stats mt-2"><span><i class="bi bi-eye"></i> ${(data.view_count||0).toLocaleString('vi-VN')} lượt xem</span><br><span><i class="bi bi-download"></i> ${(data.download_count||0).toLocaleString('vi-VN')} lượt tải</span></div><div class="d-grid gap-2 my-3"><a class="btn btn-sm btn-primary" target="_blank" href="${data.drive_view||'#'}"><i class="bi bi-eye me-1"></i>Làm bài</a><a class="btn btn-sm btn-outline-primary" target="_blank" href="${data.drive_download||data.drive_view||'#'}"><i class="bi bi-download me-1"></i>Tải xuống PDF</a></div>${hasSolution?`<div class="testcase-box mb-3"><div class="fw-semibold mb-1">Lời giải</div><div class="small text-secondary">${data.solution_detail}</div></div>`:''}<div ${tests.length?'':'hidden'}><h3 class="h6 fw-semibold mb-2">Chấm nhanh theo testcase</h3>${tests.map((t,idx)=>`<div class="testcase-box mb-2"><div class="small text-muted mb-1">Test #${idx+1}</div><div><b>Input:</b> <code>${t.input??'-'}</code></div><div class="mb-2"><b>Output mong đợi:</b> <code>${t.output??'-'}</code></div><label class="form-label small">Output của bạn</label><input class="form-control form-control-sm user-out" data-idx="${idx}" placeholder="Nhập output để kiểm tra"><button class="btn btn-sm btn-outline-success mt-2 check-one" data-idx="${idx}"><i class="bi bi-check2-circle me-1"></i>Kiểm tra</button><div class="small mt-2 result" id="res-${idx}"></div></div>`).join('')}</div></div></div></div></div>`;document.querySelectorAll('.exam-thumb').forEach(el=>el.addEventListener('click',()=>{document.getElementById('previewImg').src=el.dataset.img;new bootstrap.Modal(document.getElementById('imageModal')).show();}));document.querySelectorAll('.check-one').forEach(btn=>btn.addEventListener('click',()=>{const idx=Number(btn.dataset.idx);const user=document.querySelector(`.user-out[data-idx="${idx}"]`).value;const ok=norm(user)===norm(tests[idx]?.output);const res=document.getElementById(`res-${idx}`);res.className=`small mt-2 result ${ok?'text-success':'text-danger'}`;res.textContent=ok?'✅ Chính xác!':'❌ Chưa đúng, thử lại nhé.';}));})();
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
