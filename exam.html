<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đề thi | CodeHSG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html"><i
                    class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a><button class="navbar-toggler"
                type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav"
                aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link"
                        href="book.html">Học liệu</a><a class="nav-link active" href="exam.html">Đề thi</a></div>
            </div>
        </div>
    </nav>
    <header class="site-header py-5">
        <div class="container">
            <h1 class="display-6 fw-bold">Kho đề thi Tin học</h1>
            <p class="lead">Bộ sưu tập đề thi được cập nhật mới nhất để luyện tập theo từng cấp học.</p>
            <div class="row g-3" id="stats"></div>
        </div>
    </header>
    <main class="container py-4">
        <div class="card content-card exam-toolbar-card mb-3">
            <div class="card-body p-3 p-lg-4">
                <div class="row g-3 align-items-end">
                    <div class="col-lg-5"><label class="form-label fw-semibold">Tìm kiếm đề thi</label>
                        <div class="input-group"><span class="input-group-text"><i
                                    class="bi bi-search"></i></span><input id="q" class="form-control"
                                placeholder="Tên đề, đơn vị, năm học, bài toán..."></div>
                    </div>
                    <div class="col-sm-6 col-lg-3"><label class="form-label fw-semibold">Cấp học</label><select
                            id="grade" class="form-select">
                            <option value="">Tất cả</option>
                        </select></div>
                    <div class="col-sm-6 col-lg-2"><label class="form-label fw-semibold">Sắp xếp</label><select
                            id="sort" class="form-select">
                            <option value="new">Mới nhất</option>
                            <option value="view">Xem nhiều</option>
                            <option value="down">Tải nhiều</option>
                        </select></div>
                    <div class="col-lg-2">
                        <div class="record-chip w-100 text-center">
                            <div class="small text-muted">Bản ghi hiển thị</div>
                            <div id="count" class="fw-semibold"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-3" id="list"></div>
        <nav class="mt-4">
            <ul class="pagination justify-content-center flex-wrap gap-1" id="paging"></ul>
        </nav>
    </main>
    <footer class="footer footer-compact fixed-bottom">
  <div class="container py-2">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2">
      <div class="small">
        <span class="fw-semibold">© 2026 TTKNDEV</span>
      </div>
      <form id="newsletterForm" class="d-flex gap-2 newsletter-form" novalidate>
        <div class="input-group input-group-sm">
          <span class="input-group-text"><i class="bi bi-envelope-at"></i></span>
          <input type="email" id="newsletterEmail" class="form-control" placeholder="Đăng ký nhận tin qua email" required>
          <button class="btn btn-warning" type="submit"><i class="bi bi-send"></i></button>
        </div>
        <small id="newsletterMsg" class="text-light-emphasis"></small>
      </form>
    </div>
  </div>
</footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/exam.js"></script>
    <script src="assets/js/newsletter.js"></script>
</body>

</html>
