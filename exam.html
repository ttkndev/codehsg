<!doctype html><html lang="vi"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Đề thi | CodeHSG</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link" href="book.html">Học liệu</a><a class="nav-link active" href="exam.html">Đề thi</a></div></div></div></nav>
<header class="site-header py-5"><div class="container"><h1 class="display-6 fw-bold">Kho đề thi Tin học</h1><p class="lead">Bộ sưu tập đề thi được cập nhật mới nhất để luyện tập theo từng cấp học.</p><div class="row g-3" id="stats"></div></div></header>
<main class="container py-4"><div class="row g-2 align-items-end mb-3"><div class="col-md-5"><label class="form-label">Tìm kiếm</label><input id="q" class="form-control" placeholder="Tên đề, đơn vị, năm học, bài toán..."></div><div class="col-md-3"><label class="form-label">Cấp học</label><select id="grade" class="form-select"><option value="">Tất cả</option></select></div><div class="col-md-2"><label class="form-label">Số bản ghi/tổng</label><div id="count" class="small fw-medium pt-2"></div></div><div class="col-md-2"><label class="form-label">Mới nhất</label><select id="sort" class="form-select form-select-sm"><option value="new">Mới nhất</option><option value="view">Xem nhiều</option><option value="down">Tải nhiều</option><option value="grade">Cấp học: Tiểu học → THCS → THPT</option></select></div></div><div class="row g-2" id="list"></div><nav class="mt-4"><ul class="pagination justify-content-center flex-wrap gap-1" id="paging"></ul></nav></main>
<footer class="footer py-5 mt-4"><div class="container"><div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3"><div><div class="fw-semibold">© 2026 CodeHSG</div><div class="small text-light-emphasis">CodeHSG Exam Library</div></div><div class="d-flex gap-2"><a class="social-link" href="#" aria-label="Github"><i class="bi bi-github"></i></a><a class="social-link" href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a><a class="social-link" href="#" aria-label="Youtube"><i class="bi bi-youtube"></i></a><a class="social-link" href="#" aria-label="Email"><i class="bi bi-envelope"></i></a></div></div></div></footer>
<script>
const EXAM_CONFIG={pageSize:9,maxPageButtons:7,gradeOrder:['Tiểu học','THCS','THPT']};
let data=[],filtered=[],page=1;
const gradeWeight=g=>{const idx=EXAM_CONFIG.gradeOrder.indexOf(g||'');return idx===-1?99:idx};
const card=i=>`<div class="col-12"><div class="card content-card exam-card"><div class="card-body p-3"><div class="d-flex flex-column flex-lg-row gap-3 align-items-lg-center"><div class="d-flex align-items-start gap-3 flex-grow-1"><div class="exam-doc-icon ${((i.tags||[]).join(' ').toLowerCase().includes('hsg'))?'icon-hsg':'icon-tht'}"><i class="bi ${((i.tags||[]).join(' ').toLowerCase().includes('hsg'))?'bi-mortarboard':'bi-journal-code'}"></i></div><div class="flex-grow-1"><h2 class="h5 mb-1">${i.title}</h2><p class="meta mb-2">${i.organization||'CodeHSG'}</p><div class="exam-problems mb-2">${(i.problem_names||[]).slice(0,4).map((n,idx)=>`<span class="badge exam-chip">${idx+1}. ${n}</span>`).join('')||'<span class="badge exam-chip">Chưa có problem_names</span>'}</div><div class="exam-info-inline"><span><i class="bi bi-file-earmark"></i> ${String(i.file_ext||'pdf').toUpperCase()}</span><span><i class="bi bi-hdd"></i> ${i.file_size||'-'}</span><span><i class="bi bi-list-ol"></i> ${i.problem_count||0} bài</span><span><i class="bi bi-clock"></i> ${i.duration||'-'}</span><span><i class="bi bi-mortarboard"></i> ${i.grade||'Khác'}</span><span><i class="bi bi-calendar2"></i> ${i.year||'-'}</span></div></div></div><div class="d-grid exam-actions"><a class="btn btn-sm btn-outline-primary" href="exam-detail.html?id=${encodeURIComponent(i.id)}"><i class="bi bi-info-circle me-1"></i>Chi tiết</a><a class="btn btn-sm btn-primary" target="_blank" href="${i.drive_view||'#'}"><i class="bi bi-eye me-1"></i>Xem</a><a class="btn btn-sm btn-outline-secondary" target="_blank" href="${i.drive_download||i.drive_view||'#'}"><i class="bi bi-download me-1"></i>Tải</a></div></div><div class="exam-stats mt-2 pt-2 d-flex gap-3"><span><i class="bi bi-eye"></i> ${(i.view_count||0).toLocaleString('vi-VN')} lượt xem</span><span><i class="bi bi-download"></i> ${(i.download_count||0).toLocaleString('vi-VN')} lượt tải</span></div></div></div></div>`;
function apply(){const q=document.getElementById('q').value.toLowerCase().trim(),g=document.getElementById('grade').value,s=document.getElementById('sort').value;filtered=data.filter(i=>(!g||i.grade===g)&&[i.title,i.organization,i.grade,i.year,...(i.problem_names||[]),...(i.tags||[])].join(' ').toLowerCase().includes(q));filtered.sort((a,b)=>s==='new'?new Date(b.last_updated)-new Date(a.last_updated):s==='view'?(b.view_count||0)-(a.view_count||0):s==='down'?(b.download_count||0)-(a.download_count||0):gradeWeight(a.grade)-gradeWeight(b.grade));page=1;render();}
function pageItems(total,p){const pages=Math.max(1,Math.ceil(total/EXAM_CONFIG.pageSize));if(pages<=EXAM_CONFIG.maxPageButtons)return Array.from({length:pages},(_,i)=>i+1);const items=[1],span=2,start=Math.max(2,p-span),end=Math.min(pages-1,p+span);if(start>2)items.push('...');for(let i=start;i<=end;i++)items.push(i);if(end<pages-1)items.push('...');items.push(pages);return items}
function render(){const total=filtered.length,pages=Math.max(1,Math.ceil(total/EXAM_CONFIG.pageSize));if(page>pages)page=pages;const slice=filtered.slice((page-1)*EXAM_CONFIG.pageSize,page*EXAM_CONFIG.pageSize);document.getElementById('list').innerHTML=slice.map(card).join('')||'<p>Không có dữ liệu phù hợp.</p>';document.getElementById('count').textContent=`Hiển thị ${slice.length}/${total} bản ghi · Trang ${page}/${pages}`;const paging=pageItems(total,page);document.getElementById('paging').innerHTML=`<li class="page-item ${page===1?'disabled':''}"><button class="page-link" onclick="page=Math.max(1,page-1);render()">‹</button></li>`+paging.map(it=>it==='...' ? '<li class="page-item disabled"><span class="page-link">…</span></li>' : `<li class="page-item ${page===it?'active':''}"><button class="page-link" onclick="page=${it};render()">${it}</button></li>`).join('')+`<li class="page-item ${page===pages?'disabled':''}"><button class="page-link" onclick="page=Math.min(${pages},page+1);render()">›</button></li>`;}
(async()=>{data=(await fetch('data/exams.json').then(r=>r.json())).filter(i=>i.is_ready);document.getElementById('stats').innerHTML=[['bi-file-earmark-text','Tổng đề thi',data.length],['bi-building','Đơn vị ra đề',new Set(data.map(i=>i.organization)).size],['bi-download','Lượt tải',data.reduce((s,i)=>s+(i.download_count||0),0).toLocaleString('vi-VN')],['bi-calendar-check','Mới cập nhật',data[0]?.last_updated||'-']].map(s=>`<div class="col-6 col-lg-3"><div class="hero-stat"><i class="bi ${s[0]} me-1"></i><div class="small">${s[1]}</div><div class="h4 mb-0">${s[2]}</div></div></div>`).join('');document.getElementById('grade').innerHTML+=[...new Set(data.map(i=>i.grade).filter(Boolean))].sort((a,b)=>gradeWeight(a)-gradeWeight(b)).map(g=>`<option>${g}</option>`).join('');['q','grade','sort'].forEach(id=>document.getElementById(id).addEventListener('input',apply));filtered=[...data];apply();})();
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script></body></html>
