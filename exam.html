<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đề thi | CodeHSG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CodeHSG</a>
      <div class="navbar-nav">
        <a class="nav-link" href="index.html">Trang chủ</a>
        <a class="nav-link" href="book.html">Sách</a>
        <a class="nav-link active" href="exam.html">Đề thi</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="h3 mb-3">Danh sách đề thi</h1>
    <input id="q" class="form-control mb-3" placeholder="Tìm theo đơn vị, năm học, cấp học..." />
    <div class="row g-3" id="examList"></div>
  </main>

  <script>
    let exams = [];
    function card(item) {
      const image = item.images?.[0] || '';
      return `<div class="col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm">
          ${image ? `<img src="${image}" class="card-img-top" alt="${item.id}">` : ''}
          <div class="card-body d-flex flex-column">
            <h2 class="h6 mb-1">${item.title} - ${item.organization || ''}</h2>
            <p class="small text-muted mb-1">Năm học: ${item.year || '-'} | Khối: ${item.grade || '-'}</p>
            <p class="small text-muted mb-1">Số bài: ${item.problem_count || '-'} | Thời gian: ${item.duration || '-'}</p>
            <div class="mt-auto d-flex gap-2">
              <a class="btn btn-sm btn-success" target="_blank" href="${item.drive_view}">Xem</a>
              <a class="btn btn-sm btn-outline-success" target="_blank" href="${item.drive_download}">Tải</a>
            </div>
          </div>
        </div>
      </div>`;
    }
    function render(list) {
      document.getElementById('examList').innerHTML = list.map(card).join('') || '<p>Không có dữ liệu phù hợp.</p>';
    }
    async function init() {
      exams = (await fetch('data/exams.json').then(r => r.json())).filter(i => i.is_ready);
      render(exams);
      document.getElementById('q').addEventListener('input', e => {
        const q = e.target.value.toLowerCase().trim();
        const filtered = exams.filter(i => [i.title, i.organization, i.grade, i.year, ...(i.problem_names || [])].join(' ').toLowerCase().includes(q));
        render(filtered);
      });
    }
    init();
  </script>
</body>
</html>
