<!doctype html><html lang="vi"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Học liệu | CodeHSG</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a><div class="navbar-nav"><a class="nav-link" href="index.html">Trang chủ</a><a class="nav-link active" href="book.html">Học liệu</a><a class="nav-link" href="exam.html">Đề thi</a></div></div></nav>
<header class="site-header py-5"><div class="container"><h1 class="display-6 fw-bold">Kho học liệu Tin học</h1><p class="lead">Sách, tài liệu chuyên đề và bài tập cho học sinh yêu thích lập trình.</p><div class="row g-3" id="stats"></div></div></header>
<main class="container py-4"><div class="row g-2 align-items-end mb-3"><div class="col-md-4"><label class="form-label">Tìm kiếm</label><input id="q" class="form-control" placeholder="Tên sách, tác giả, danh mục..."></div><div class="col-md-3"><label class="form-label">Danh mục</label><select id="cat" class="form-select"><option value="">Tất cả</option></select></div><div class="col-md-3"><label class="form-label">Sắp xếp</label><select id="sort" class="form-select"><option value="new">Mới nhất</option><option value="down">Tải nhiều</option></select></div><div class="col-md-2"><div id="count" class="record-chip"></div></div></div><div class="row g-3" id="list"></div><nav class="mt-4"><ul class="pagination justify-content-center" id="paging"></ul></nav></main>
<footer class="footer py-4 mt-4"><div class="container d-flex justify-content-between"><span>© 2026 CodeHSG</span><span>CodeHSG Book Library</span></div></footer>
<script>
let data=[],filtered=[],page=1;const size=9;const card=i=>`<div class="col-md-6 col-lg-4"><div class="card content-card">${i.images?.[0]?`<img src="${i.images[0]}">`:''}<div class="card-body"><h2 class="h6">${i.title}</h2><p class="meta mb-1"><i class="bi bi-person"></i> ${i.author||'Đang cập nhật'}</p><p class="meta mb-1"><i class="bi bi-bookmark"></i> ${i.category||'-'} • <i class="bi bi-file-earmark-text"></i> ${i.pages||'-'} trang</p><p class="meta"><i class="bi bi-calendar2"></i> ${i.year||'-'} • <i class="bi bi-download"></i> ${(i.download_count||0).toLocaleString('vi-VN')}</p><a class="btn btn-primary btn-sm" target="_blank" href="${i.drive_view}"><i class="bi bi-eye"></i> Xem</a> <a class="btn btn-outline-primary btn-sm" target="_blank" href="${i.drive_download}"><i class="bi bi-cloud-download"></i> Tải</a></div></div></div>`;
function apply(){const q=document.getElementById('q').value.toLowerCase().trim(),c=document.getElementById('cat').value,s=document.getElementById('sort').value;filtered=data.filter(i=>(!c||i.category===c)&&[i.title,i.author,i.category,...(i.subcategory||[])].join(' ').toLowerCase().includes(q));filtered.sort((a,b)=>s==='new'?new Date(b.last_updated)-new Date(a.last_updated):(b.download_count||0)-(a.download_count||0));page=1;render();}
function render(){const total=filtered.length,pages=Math.max(1,Math.ceil(total/size)),slice=filtered.slice((page-1)*size,page*size);document.getElementById('list').innerHTML=slice.map(card).join('')||'<p>Không có dữ liệu phù hợp.</p>';document.getElementById('count').textContent=`Hiển thị ${slice.length}/${total} bản ghi`;document.getElementById('paging').innerHTML=Array.from({length:pages},(_,k)=>`<li class="page-item ${page===k+1?'active':''}"><button class="page-link" onclick="page=${k+1};render()">${k+1}</button></li>`).join('');}
(async()=>{data=(await fetch('data/books.json').then(r=>r.json())).filter(i=>i.is_ready);document.getElementById('stats').innerHTML=[['bi-journal-richtext','Tổng học liệu',data.length],['bi-tags','Danh mục',new Set(data.map(i=>i.category)).size],['bi-download','Lượt tải',data.reduce((s,i)=>s+(i.download_count||0),0).toLocaleString('vi-VN')],['bi-calendar-check','Mới cập nhật',data[0]?.last_updated||'-']].map(s=>`<div class="col-6 col-lg-3"><div class="hero-stat"><i class="bi ${s[0]} me-1"></i><div class="small">${s[1]}</div><div class="h4 mb-0">${s[2]}</div></div></div>`).join('');document.getElementById('cat').innerHTML+=[...new Set(data.map(i=>i.category).filter(Boolean))].map(g=>`<option>${g}</option>`).join('');['q','cat','sort'].forEach(id=>document.getElementById(id).addEventListener('input',apply));filtered=[...data];apply();})();
</script></body></html>
