<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CodeHSG - Thư viện tài liệu Tin học</title>
  <meta name="description" content="Kho tài liệu sách và đề thi Tin học cho học sinh giỏi." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">CodeHSG</a>
      <div class="navbar-nav">
        <a class="nav-link active" href="index.html">Trang chủ</a>
        <a class="nav-link" href="book.html">Sách</a>
        <a class="nav-link" href="exam.html">Đề thi</a>
      </div>
    </div>
  </nav>

  <header class="py-5 bg-primary text-white">
    <div class="container">
      <h1 class="display-6 fw-bold">Thư viện tài liệu Tin học HSG</h1>
      <p class="lead mb-0">Tổng hợp sách thuật toán và đề thi học sinh giỏi các cấp.</p>
    </div>
  </header>

  <main class="container py-5">
    <div class="row g-4" id="summaryCards">
      <div class="col-md-4"><div class="card shadow-sm"><div class="card-body"><h2 class="h5">Tổng số sách</h2><p class="display-6 mb-0" id="bookCount">...</p></div></div></div>
      <div class="col-md-4"><div class="card shadow-sm"><div class="card-body"><h2 class="h5">Tổng số đề thi</h2><p class="display-6 mb-0" id="examCount">...</p></div></div></div>
      <div class="col-md-4"><div class="card shadow-sm"><div class="card-body"><h2 class="h5">Tổng lượt tải</h2><p class="display-6 mb-0" id="downloadCount">...</p></div></div></div>
    </div>

    <section class="mt-5">
      <h2 class="h4">Đi nhanh tới nội dung</h2>
      <div class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-primary" href="book.html">Xem danh sách sách</a>
        <a class="btn btn-outline-success" href="exam.html">Xem danh sách đề thi</a>
      </div>
    </section>
  </main>

  <script>
    async function loadSummary() {
      const [books, exams] = await Promise.all([
        fetch('data/books.json').then(r => r.json()),
        fetch('data/exams.json').then(r => r.json())
      ]);

      const readyBooks = books.filter(i => i.is_ready);
      const readyExams = exams.filter(i => i.is_ready);
      const downloads = [...readyBooks, ...readyExams].reduce((sum, i) => sum + (i.download_count || 0), 0);

      document.getElementById('bookCount').textContent = readyBooks.length;
      document.getElementById('examCount').textContent = readyExams.length;
      document.getElementById('downloadCount').textContent = downloads.toLocaleString('vi-VN');
    }
    loadSummary();
  </script>
</body>
</html>
