<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CodeHSG - Thư viện tài liệu Tin học</title>
  <meta name="description" content="Kho tài liệu sách và đề thi Tin học cho học sinh giỏi." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-code-square me-1 text-primary"></i>CodeHSG</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link active" href="index.html">Trang chủ</a>
          <a class="nav-link" href="book.html">Học liệu</a>
          <a class="nav-link" href="exam.html">Đề thi</a>
        </div>
      </div>
    </div>
  </nav>

  <header class="site-header py-5">
    <div class="container">
      <h1 class="display-6 fw-bold">Thư viện tài liệu Tin học HSG</h1>
      <p class="lead">Nền tảng chia sẻ đề thi, sách và chuyên đề giúp học sinh luyện tập hiệu quả.</p>
      <div class="row g-3" id="heroStats"></div>
    </div>
  </header>

  <main class="container py-5">
    <section class="mb-5">
      <h2 class="section-title h4"><i class="bi bi-stars text-warning"></i>Tài nguyên nổi bật</h2>
      <div class="row g-3 mt-1" id="featuredResources"></div>
    </section>

    <section>
      <h2 class="section-title h4"><i class="bi bi-trophy-fill text-danger"></i>Vinh danh thành viên đóng góp</h2>
      <div class="row g-3 mt-1" id="contributors"></div>
    </section>
  </main>

  <footer class="footer footer-compact">
    <div class="container py-3">
      <div class="footer-layout">
        <div class="small">
          <span class="fw-semibold">© 2026 CodeHSG</span> · <span>Tác giả: TTKNDEV</span>
        </div>

        <form id="newsletterForm" class="d-flex gap-2 newsletter-form" novalidate>
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-envelope-at"></i></span>
            <input type="email" id="newsletterEmail" class="form-control" placeholder="Đăng ký nhận tin qua email" required>
            <button class="btn btn-warning" type="submit"><i class="bi bi-send"></i></button>
          </div>
          <small id="newsletterMsg" class="text-light-emphasis"></small>
        </form>

        <div class="d-flex gap-2 justify-content-end">
          <a class="social-link" href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
          <a class="social-link" href="#" aria-label="Youtube"><i class="bi bi-youtube"></i></a>
          <a class="social-link" href="#" aria-label="Github"><i class="bi bi-github"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const card = (i, type) => `<div class="col-md-6 col-lg-4"><div class="card content-card"><img src="${i.images?.[0] || 'assets/images/ltc-banner.png'}"><div class="card-body"><h3 class="h6">${i.title}</h3><p class="meta mb-2"><i class="bi bi-calendar2-event"></i> ${i.year || '-'} • <i class="bi bi-download"></i> ${(i.download_count || 0).toLocaleString('vi-VN')}</p><a class="btn btn-sm btn-${type === 'exam' ? 'success' : 'primary'}" target="_blank" href="${i.drive_view}"><i class="bi bi-eye"></i> Xem nhanh</a></div></div></div>`;

    (async () => {
      const [books, exams, cons] = await Promise.all([
        fetch('data/books.json').then(r => r.json()),
        fetch('data/exams.json').then(r => r.json()),
        fetch('data/contributors.json').then(r => r.json())
      ]);

      const rb = books.filter(i => i.is_ready);
      const re = exams.filter(i => i.is_ready);
      const totalDown = [...rb, ...re].reduce((s, i) => s + (i.download_count || 0), 0);

      document.getElementById('heroStats').innerHTML = [
        ['bi-journal-bookmark', 'Học liệu', rb.length],
        ['bi-file-earmark-text', 'Đề thi', re.length],
        ['bi-cloud-arrow-down', 'Lượt tải', totalDown.toLocaleString('vi-VN')],
        ['bi-people', 'Cộng tác viên', cons.length]
      ].map(s => `<div class="col-6 col-lg-3"><div class="hero-stat"><i class="bi ${s[0]} me-1"></i><div class="small">${s[1]}</div><div class="h4 mb-0">${s[2]}</div></div></div>`).join('');

      const newest = arr => arr.sort((a, b) => new Date(b.last_updated) - new Date(a.last_updated));
      const resourceCards = [
        ...newest([...rb]).slice(0, 3).map(i => card(i, 'book')),
        ...newest([...re]).slice(0, 3).map(i => card(i, 'exam'))
      ];
      document.getElementById('featuredResources').innerHTML = resourceCards.join('');

      document.getElementById('contributors').innerHTML = cons.slice(0, 3).map(c =>
        `<div class="col-lg-4"><div class="card content-card"><div class="card-body"><h3 class="h6 mb-1"><i class="bi bi-person-badge"></i> ${c.name}</h3><p class="mb-1"><span class="highlight">${c.counts}</span> tài liệu đã đóng góp</p><p class="meta mb-0">${c.bio || 'Thành viên tích cực của dự án CodeHSG.'}</p></div></div></div>`
      ).join('');
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/newsletter.js"></script>
</body>

</html>
